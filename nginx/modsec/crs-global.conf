# nginx-proxy-guard ModSecurity Global Configuration
# CRS rules are loaded ONCE here for all server blocks.
# Per-host WAF tuning is applied via inline modsecurity_rules in each server block.
#
# Default: SecRuleEngine Off (WAF disabled globally)
# WAF-enabled hosts override this with SecRuleEngine On/DetectionOnly
# via per-host modsecurity_rules directives.

# Default WAF off - each host enables explicitly
SecRuleEngine Off

# Include base ModSecurity configuration
Include /etc/nginx/modsec/modsec-base.conf

# Include OWASP CRS setup
Include /etc/nginx/owasp-crs/crs-setup.conf

# =============================================================================
# Default CRS tuning (can be overridden per-host)
# =============================================================================

# Allowed HTTP methods - include REST API methods
SecAction "id:900200,phase:1,pass,t:none,nolog,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# Allowed HTTP versions - include HTTP/3.0 for QUIC
SecAction "id:900230,phase:1,pass,t:none,nolog,setvar:'tx.allowed_http_versions=HTTP/1.1 HTTP/2 HTTP/2.0 HTTP/3.0'"

# Request body / file size limits (aligned with SecRequestBodyLimit in modsec-base.conf)
SecAction "id:900300,phase:1,pass,t:none,nolog,setvar:tx.max_file_size=13107200,setvar:tx.combined_file_sizes=13107200"

# Include OWASP CRS rules
Include /etc/nginx/owasp-crs/rules/*.conf

# Custom nginx-guard rules
Include /etc/nginx/modsec/custom-rules.conf
